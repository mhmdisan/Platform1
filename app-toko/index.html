<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>ListKu</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #1A56FF;
            --blue-dark: #1240D4;
            --blue-light: #EEF2FF;
            --sidebar-w: 200px;
            --white: #ffffff;
            --gray-50: #F8F9FC;
            --gray-100: #F1F3F9;
            --gray-200: #E4E8F0;
            --gray-400: #9AA3B8;
            --gray-600: #5A6480;
            --gray-800: #1E2540;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(26,86,255,0.08);
            /* Warna mode Edit */
            --amber: #D97706;
            --amber-light: #FFFBEB;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--blue);
            display: flex;
            flex-direction: column;
            padding: 28px 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--white);
            padding: 0 24px 32px;
            letter-spacing: -0.5px;
        }
        .logo span { color: rgba(255,255,255,0.55); }
        .nav-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            padding: 0 24px 10px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            border-left: 3px solid transparent;
            text-decoration: none;
        }
        .nav-item i { font-size: 16px; width: 20px; text-align: center; }
        .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.08); }
        .nav-item.active {
            color: var(--white);
            background: rgba(255,255,255,0.15);
            border-left-color: var(--white);
        }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }
        .sidebar-footer a {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            text-decoration: none;
            transition: color .2s;
        }
        .sidebar-footer a:hover { color: var(--white); }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-800);
        }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--gray-100);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-600);
            font-size: 15px;
            transition: background .2s;
        }
        .icon-btn:hover { background: var(--gray-200); }
        .avatar-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .avatar-caret { color: var(--gray-400); font-size: 12px; }

        /* ── CONTENT ── */
        .content { padding: 28px 32px; flex: 1; }

        /* ══════════════════════════════════════════
           FORM CARD — berubah tampilan sesuai mode
           ══════════════════════════════════════════ */
        .form-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border-top: 4px solid var(--blue);   /* garis aksen atas */
            transition: border-color .3s;
        }
        /* Saat mode Edit, garis aksen berubah kuning */
        .form-card.mode-edit { border-top-color: var(--amber); }

        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-title i { color: var(--blue); transition: color .3s; }
        .form-card.mode-edit .form-title i { color: var(--amber); }

        /* Label status mode (muncul saat Edit) */
        .mode-badge {
            display: none;
            align-items: center;
            gap: 6px;
            background: var(--amber-light);
            color: var(--amber);
            border: 1px solid #FCD34D;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .form-card.mode-edit .mode-badge { display: inline-flex; }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .form-group { flex: 1; min-width: 180px; }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            border: 1px solid var(--gray-200);
            padding: 9px 12px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--gray-800);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(26,86,255,0.10);
        }

        .form-actions { display: flex; gap: 10px; }

        /* Tombol Simpan — berubah warna saat mode Edit */
        #btn-simpan {
            background: var(--blue);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 9px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background .2s;
        }
        #btn-simpan:hover { filter: brightness(0.9); }
        /* Mode Edit → amber/kuning */
        #btn-simpan.mode-edit { background: var(--amber); }

        /* Tombol Batal — hanya muncul saat Edit */
        #btn-batal {
            display: none;
            align-items: center;
            gap: 8px;
            background: var(--gray-100);
            color: var(--gray-600);
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 9px 20px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s;
        }
        #btn-batal:hover { background: var(--gray-200); }

        /* ── TABLE ── */
        .table-wrap {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 13px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-400);
            letter-spacing: 0.4px;
            border-bottom: 1px solid var(--gray-100);
            white-space: nowrap;
        }
        tbody tr {
            border-bottom: 1px solid var(--gray-100);
            transition: background .15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--gray-50); }

        /* Baris yang sedang diedit diberi sorotan kuning */
        tbody tr.row-editing { background: #FFFBEB !important; }
        tbody tr.row-editing td { color: var(--gray-800); }

        td {
            padding: 14px 16px;
            font-size: 13.5px;
            color: var(--gray-800);
            vertical-align: middle;
        }
        .actions-cell { display: flex; align-items: center; gap: 6px; }

        /* Tombol aksi di tabel */
        .row-action {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--gray-100);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-600);
            font-size: 13px;
            transition: all .2s;
        }
        .row-action:hover { background: var(--blue); color: var(--white); }
        .row-action.delete:hover { background: #ef4444; color: var(--white); }

        /* ── PAGINATION ── */
        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-top: 1px solid var(--gray-100);
        }
        .pagination-info { font-size: 12.5px; color: var(--gray-400); }
        .pagination-btns { display: flex; gap: 4px; }
        .page-btn {
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid var(--gray-200);
            background: var(--white);
            font-size: 12.5px;
            color: var(--gray-600);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
            font-family: 'DM Sans', sans-serif;
        }
        .page-btn:hover { border-color: var(--blue); color: var(--blue); }
        .page-btn.active { background: var(--blue); border-color: var(--blue); color: var(--white); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── ANIMASI ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .table-wrap { animation: fadeUp .35s ease both; }
        .form-card  { animation: fadeUp .25s ease both; }
    </style>
</head>
<body>

<!-- ══════════ SIDEBAR ══════════ -->
<aside class="sidebar">
    <div class="logo">L<span>ist</span>K<span>u</span></div>

    <span class="nav-label">Menu</span>
    <a class="nav-item" href="#"><i class="fa-solid fa-list-ul"></i>Daftar</a>
    <a class="nav-item active" href="#"><i class="fa-solid fa-plus"></i>Tambah</a>

    <div class="sidebar-footer">
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">Google</a>
    </div>
</aside>


<!-- ══════════ MAIN ══════════ -->
<div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="page-title">Daftar Barang</div>
        <div class="topbar-right">
            <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            <div class="avatar-wrap">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;">A</div>
                <i class="fa-solid fa-chevron-down avatar-caret"></i>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="content">

        <!-- ══════════════════════════════════════════════
             FORM TAMBAH / EDIT  — 1 FORM, 2 MODE
             Konsep dosen: Hidden Input sebagai kantong
             rahasia penentu mode POST vs PUT
             ══════════════════════════════════════════════ -->
        <div class="form-card" id="form-card">

            <div class="form-title">
                <i class="fa-solid fa-plus" id="form-icon"></i>
                <span id="form-title-text">Tambah Barang Baru</span>
                <!-- Badge mode Edit — tersembunyi saat mode Tambah -->
                <span class="mode-badge" id="mode-badge">
                    <i class="fa-solid fa-pen-to-square"></i> Mode Edit
                </span>
            </div>

            <form id="form-tambah" class="form-row">

                <!--
                    ╔═══════════════════════════════════════════╗
                    ║   INPUT HIDDEN — "Kantong Rahasia"        ║
                    ║   Kosong ("")  → mode Tambah  (POST)      ║
                    ║   Berisi angka → mode Update  (PUT)       ║
                    ╚═══════════════════════════════════════════╝
                -->
                <input type="hidden" id="input-id">

                <div class="form-group">
                    <label class="form-label">Nama Barang</label>
                    <input type="text" id="input-nama" class="form-input"
                           placeholder="Misal: Mouse Wireless" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Harga (Rp)</label>
                    <input type="number" id="input-harga" class="form-input"
                           placeholder="Misal: 150000" min="1" required>
                </div>

                <div class="form-actions">
                    <!-- Tombol Batal — hanya tampil saat mode Edit -->
                    <button type="button" id="btn-batal" onclick="batalEdit()">
                        <i class="fa-solid fa-xmark"></i> Batal
                    </button>
                    <!-- Tombol Simpan — teks & warna berubah sesuai mode -->
                    <button type="submit" id="btn-simpan">
                        <i class="fa-solid fa-floppy-disk" id="btn-icon"></i>
                        <span id="btn-text">Simpan</span>
                    </button>
                </div>

            </form>
        </div>
        <!-- ═════════════ END FORM ═════════════ -->


        <!-- TABEL BARANG -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama Barang</th>
                        <th>Harga</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-barang"></tbody>
            </table>
            <div class="pagination-bar">
                <span class="pagination-info" id="pagination-info"></span>
                <div class="pagination-btns" id="pagination-btns"></div>
            </div>
        </div>

    </div>
</div>

<!-- Feather Icons -->
<script src="https://unpkg.com/feather-icons"></script>
<!-- App JS -->
<script src="app.js"></script>
</body>
</html>
